kind: "Dashboard"
metadata:
  name: "etcd-health-and-performance"
  project: "default"
spec:
  display:
    name: "ETCD Health and Performance"
    description: "etcd health and performance from must-gather data"
  duration: "1h"
  refreshInterval: "0s"
  panels:
    has-leader:
      kind: "Panel"
      spec:
        display:
          name: "Has Leader"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "etcd_server_has_leader"
    leader-changes:
      kind: "Panel"
      spec:
        display:
          name: "Leader Changes"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "etcd_server_leader_changes_seen_total"
    proposals-failed:
      kind: "Panel"
      spec:
        display:
          name: "Failed Proposals"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "etcd_server_proposals_failed_total"
    proposals-pending:
      kind: "Panel"
      spec:
        display:
          name: "Pending Proposals"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "etcd_server_proposals_pending"
    backend-commit-p99:
      kind: "Panel"
      spec:
        display:
          name: "Disk Backend Commit Latency p99 (seconds)"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket[5m]))"
    wal-fsync-p99:
      kind: "Panel"
      spec:
        display:
          name: "WAL fsync Latency p99 (seconds)"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m]))"
    db-size:
      kind: "Panel"
      spec:
        display:
          name: "DB Size (bytes)"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "etcd_mvcc_db_total_size_in_bytes"
    peer-rtt-p99:
      kind: "Panel"
      spec:
        display:
          name: "Peer Round-Trip Time p99 (seconds)"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket[5m]))"
    firing-alerts:
      kind: "Panel"
      spec:
        display:
          name: "Firing Alerts"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "ALERTS{alertname=~'.*[Ee]tcd.*', alertstate='firing'}"
  layouts:
    - kind: "Grid"
      spec:
        display:
          title: "Health"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 6
            height: 8
            content:
              $ref: "#/spec/panels/has-leader"
          - x: 6
            y: 0
            width: 6
            height: 8
            content:
              $ref: "#/spec/panels/leader-changes"
          - x: 12
            y: 0
            width: 6
            height: 8
            content:
              $ref: "#/spec/panels/proposals-failed"
          - x: 18
            y: 0
            width: 6
            height: 8
            content:
              $ref: "#/spec/panels/proposals-pending"
    - kind: "Grid"
      spec:
        display:
          title: "Disk Performance"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/backend-commit-p99"
          - x: 8
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/wal-fsync-p99"
          - x: 16
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/db-size"
    - kind: "Grid"
      spec:
        display:
          title: "Network"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 24
            height: 8
            content:
              $ref: "#/spec/panels/peer-rtt-p99"
    - kind: "Grid"
      spec:
        display:
          title: "Alerts"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 24
            height: 8
            content:
              $ref: "#/spec/panels/firing-alerts"
